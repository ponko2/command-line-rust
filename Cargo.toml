[workspace]
resolver = "3"
members = ["cmd/*"]

[workspace.dependencies]
anyhow = "1.0.102"
assert_cmd = "2.1.2"
clap = { version = "4.5.60", features = ["derive"] }
predicates = "3.1.4"
pretty_assertions = "1.4.1"
rand = "0.10.0"
tempfile = "3.26.0"

[workspace.package]
edition = "2024"
license = "MIT"
publish = false
version = "0.1.0"
